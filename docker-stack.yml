version: "3.8"

services:
  frontend:
    image: medbook-sre-frontend:latest
    ports:
      - "8081:80"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
    networks:
      - medbook_net

  backend:
    image: medbook-sre-backend:latest
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/medbook
      JWT_SECRET: UJeIvA9VePBtLSQX
      SESSION_SECRET: super_secret_123456789
      NODE_ENV: production
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - mongo
    networks:
      - medbook_net

  mongo:
    image: mongo:7.0
    volumes:
      - mongo_data:/data/db
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    networks:
      - medbook_net

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    deploy:
      replicas: 1
    networks:
      - medbook_net

  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: medbook123
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      replicas: 1
    networks:
      - medbook_net

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:

networks:
  medbook_net:
    driver: overlay
    attachable: true
