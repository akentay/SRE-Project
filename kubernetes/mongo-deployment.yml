apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: medbook-mongo
  namespace: medbook
spec:
  serviceName: "mongo"
  replicas: 1
  selector:
    matchLabels:
      app: medbook-mongo
  template:
    metadata:
      labels:
        app: medbook-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: medbook
spec:
  selector:
    app: medbook-mongo
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None
