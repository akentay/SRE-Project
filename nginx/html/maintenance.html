<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedBook - Temporarily Unavailable</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { color: #1a1a2e; font-size: 22px; margin-bottom: 12px; }
    p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 10px; }
    .status {
      display: inline-block;
      background: #fff3cd;
      color: #856404;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏥</div>
    <h1>MedBook is temporarily unavailable</h1>
    <p>We are performing scheduled maintenance. The appointment system will be back shortly.</p>
    <p>If your situation is urgent, please contact the clinic directly.</p>
    <div class="status">⚙️ Maintenance in progress</div>
  </div>
</body>
</html>
