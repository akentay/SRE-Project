version: "3.8"

services:
  frontend:
    build:
      context: ./MedBook-Mongo
      dockerfile: ../Dockerfile.frontend
    container_name: medbook_frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - medbook_net

  backend:
    build:
      context: ./MedBook-Mongo
      dockerfile: ../Dockerfile.backend
    container_name: medbook_backend
    restart: on-failure:5
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/medbook
      JWT_SECRET: UJeIvA9VePBtLSQX
      SESSION_SECRET: super_secret_123456789
      NODE_ENV: development
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - medbook_net

  mongo:
    image: mongo:7.0
    container_name: medbook_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medbook_net

  mongo_exporter:
    image: percona/mongodb_exporter:0.40
    container_name: medbook_mongo_exporter
    restart: unless-stopped
    command:
      - "--mongodb.uri=mongodb://mongo:27017"
      - "--collect-all"
    ports:
      - "9216:9216"
    depends_on:
      - mongo
    networks:
      - medbook_net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: medbook_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - medbook_net

  node_exporter:
    image: prom/node-exporter:v1.7.0
    container_name: medbook_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - medbook_net

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.24.0
    container_name: medbook_blackbox
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - medbook_net

  grafana:
    image: grafana/grafana:10.3.3
    container_name: medbook_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: medbook123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - medbook_net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: medbook_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - medbook_net

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:

networks:
  medbook_net:
    driver: bridge
